# Hardware profiles for CROSSFIRE-X
# Five compute targets across two machines: T1-T5.
# Interconnect is TCP/IP (USB4 in production, WiFi/5GbE during dev).

nodes:
  pc:
    name: "PC (RTX 5090)"
    host: "192.168.1.100"
    port: 8080
    targets:
      - target: cuda_gpu   # T1
        role: prefill
        specs:
          gpu: "RTX 5090"
          gpu_vram_gb: 32
          gpu_bandwidth_tb_s: 1.792
          gpu_tflops_fp16: 200
          system_ram_gb: 64
          power_watts: 350
        exo:
          backend: cuda
        flash_moe:
          build_flags: "-DGGML_CUDA=ON -DLLAMA_FLASH_MOE_GPU_BANK=ON"
          mode: "stock"  # all experts in 32 GB VRAM for 20-specialist pool

  mac:
    name: "Mac Studio (M4 Max)"
    host: "192.168.1.101"
    port: 8080
    targets:
      - target: metal_gpu  # T2
        role: decode
        specs:
          gpu: "M4 Max (40-core)"
          unified_memory_gb: 64
          bandwidth_gb_s: 546
          tflops_fp16: 54
          power_watts: 50
        exo:
          backend: mlx
        flash_moe:
          build_flags: "-DGGML_METAL=ON -DLLAMA_FLASH_MOE_GPU_BANK=ON"
          mode: "stock"  # default; switch to slot-bank for pools > 64 GB

      - target: ane         # T3
        role: draft
        specs:
          cores: 16
          tflops_fp16: 19
          sram_mb: 32       # 32 MB SRAM cliff — keep activations below this
          power_watts: 3
          max_model_params_b: 8
          max_context: 4096
          zero_copy_with_gpu: true  # IOSurface shared with Metal GPU
        backend: anemll      # primary; rustane as alternative
        constraints:
          - "macOS 26.3 routes CoreML compute_units=ALL to GPU — use direct private API"
          - "dim=5120 has 4.7x efficiency penalty — keep hidden_dim ≤ 4096"
          - "models capped at ~8B parameters; context capped at 2048–4096"

      - target: cpu_sme     # T4
        role: scheduler
        specs:
          cores: 16
          power_watts: 12
          framework: "Accelerate"
        roles:
          - KV cache management
          - Speculative decode verification
          - AutoPilot policy model (lightweight)

      - target: nvme_ssd    # T5 — Flash-MoE expert streaming
        role: expert_streaming
        specs:
          effective_bandwidth_gb_s: 4.7  # pread() sustained on Mac Studio SSD
          capacity_tb: 1                  # typical Mac Studio SSD
          power_watts: 1
        notes: >
          T5 is used only by P6 (Flash-MoE slot-bank). When the slot-bank
          hot-expert cache misses, expert weights are loaded from NVMe via
          pread() in anemll-flash-llama.cpp. With temporal prefetch enabled,
          hit rate approaches 100% after warmup — NVMe loads drop to near zero
          during sustained generation.

    # Mac-specific system config
    metal_config:
      iogpu_wired_limit_mb: 58982  # sudo sysctl iogpu.wired_limit_mb=58982
      # Unlocks ~90% of 64 GB for Metal. Required before any inference run.

# TCP/IP interconnect. All distributed policies (P1–P6) run over this link.
# No RDMA: composed TriAttention + TurboQuant (6.8x KV reduction) makes
# USB4/5GbE bandwidth sufficient (crossfire_x_final.docx §2, §4.2).
interconnect:
  primary:
    link: usb4                  # production target: 40 Gbps active cable
    bandwidth_gbps: 40
    latency_us: 300             # TCP/IP round-trip
    cable: "USB4 40 Gbps active, 2–3 m (Cable Matters / Anker, ~$30–50)"
    setup: >
      Thunderbolt IP bridge must be configured on both machines so that
      USB4 presents as a TCP/IP network interface. Verify with
      `iperf3` between nodes after cable is connected.
  fallback:
    link: 5gbe                  # onboard Realtek 5GbE on ASUS ROG STRIX X870E-E
    bandwidth_gbps: 5
    latency_us: 500
    notes: "Used for EXO discovery and as data-path fallback if USB4 is unavailable."
  dev:
    link: wifi                  # current bring-up link (WiFi 7)
    bandwidth_gbps: 1
    latency_us: 2000
    notes: "Development / bring-up only. Expect reduced decode throughput."
