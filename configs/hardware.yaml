# Hardware profiles for CROSSFIRE v2 distributed inference
# Five compute targets: T1 (CUDA), T2 (Metal GPU), T3 (ANE), T4 (CPU/SME), T5 (RDMA)

nodes:
  pc:
    name: "PC (RTX 5090)"
    host: "192.168.1.100"
    port: 8080
    targets:
      - target: cuda_gpu
        role: prefill
        specs:
          gpu: "RTX 5090"
          gpu_vram_gb: 32
          gpu_bandwidth_tb_s: 1.792
          gpu_tflops_fp16: 200
          system_ram_gb: 64
          power_watts: 350
        exo:
          backend: cuda

  mac:
    name: "Mac Studio (M4 Max)"
    host: "192.168.1.101"
    port: 8080
    targets:
      - target: metal_gpu
        role: decode
        specs:
          gpu: "M4 Max (40-core)"
          unified_memory_gb: 64
          bandwidth_gb_s: 546
          power_watts: 50
        exo:
          backend: mlx

      - target: ane
        role: draft
        specs:
          cores: 16
          tflops_fp16: 19
          sram_mb: 32
          power_watts: 3
          max_model_params_b: 8
          max_context: 4096
        backend: anemll  # or rustane

      - target: cpu_sme
        role: scheduler
        specs:
          cores: 16
          power_watts: 12

    # Mac-specific config
    metal_config:
      iogpu_wired_limit_mb: 58982  # sudo sysctl iogpu.wired_limit_mb=58982

network:
  interconnect: thunderbolt5_rdma
  bandwidth_gbps: 80
  latency_us: 3
  rdma_enabled: true
  # RDMA enable: Recovery mode -> rdma_ctl enable
  # Requires: macOS Tahoe 26.2+, genuine TB5 cable (not TB4)
