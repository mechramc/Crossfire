# Model definitions for CROSSFIRE-X experiments
# Paths are relative to the models/ directory (gitignored)

models:
  # ── Dense models ─────────────────────────────────────────────────────────
  qwen3.5-27b:
    name: "Qwen 3.5 27B"
    parameters: 27B
    architecture: dense
    role: primary_dense  # Non-MoE experiments (C0, C2, C4, C5)
    variants:
      q8_0:
        file: "qwen3.5-27b-q8_0.gguf"
        size_gb: 26.6
      tq4_1s:
        file: "qwen3.5-27b-tq4_1s.gguf"
        size_gb: 19.1
        compress_from: q8_0  # TQ4_1S from Q8_0 only (not Q4_K_M)
    eval_contexts: [8192, 16384, 32768]
    notes: "Fits both machines independently at Q8_0. Primary for P0–P5 experiments."

  qwen3.5-0.6b:
    name: "Qwen 3.5 0.6B"
    parameters: 0.6B
    architecture: dense
    role: ane_draft
    source: "huggingface"  # HuggingFace weights → converted to ANE via ANEMLL
    ane_config:
      backend: anemll
      max_context: 2048
      expected_tok_s: 50  # 47–62 tok/s per ANEMLL benchmarks
    notes: "ANE draft model for speculative decode (T3). 2–5W power draw."

  qwen2.5-72b:
    name: "Qwen 2.5 72B"
    parameters: 72B
    architecture: dense
    role: stretch_goal
    variants:
      q8_0:
        file: "qwen2.5-72b-q8_0.gguf"
        size_gb: 72.0
      tq4_1s:
        file: "qwen2.5-72b-tq4_1s.gguf"
        size_gb: 45.8
        compress_from: q8_0
    eval_contexts: [8192, 16384]
    notes: >
      Requires distributed (P5) — fits neither machine alone at Q8_0.
      TQ4_1S (~45.8 GB) still exceeds 5090 VRAM alone; needs EXO split.
      This is the "impossible scenario" — only feasible with combined memory pool.

  # ── MoE models ────────────────────────────────────────────────────────────
  qwen3.5-35b-a3b:
    name: "Qwen 3.5 35B-A3B"
    parameters: 35B total / 3B active
    architecture: moe
    role: primary_moe  # Flash-MoE experiments (C1, C3, C5, C6)
    variants:
      gguf:
        file: "qwen3.5-35b-a3b-q8_0.gguf"
        size_gb: ~34.4
    flash_moe_config:
      experts_total: 64        # total specialist count in the model
      topk: 8                  # activated experts per token
      slot_bank_slots: 64      # recommended slot-bank size
      mode_stock: true         # all experts fit in 64 GB unified memory
      mode_slot_bank: false    # optional for larger pools
    eval_contexts: [8192, 16384, 32768]
    notes: >
      Primary Flash-MoE test model. Sidecar extraction required before slot-bank mode.
      All experts (~20 active specialists equivalent) fit resident on Mac Studio 64 GB.
      Use --moe-mode stock for Phase 2 baseline; slot-bank for scaling experiments.

# ── Evaluation dataset ───────────────────────────────────────────────────────
eval_dataset: "wikitext-2-raw-v1"
eval_chunks: 20
eval_chunk_tokens: 512

# ── Ablation matrix (C0–C7) ──────────────────────────────────────────────────
# Tests each component in isolation to measure its independent contribution.
# C0 = floor (pure EXO), C5 = headline (full stack).
# Note: AutoPilot uses execution policies P0–P6 at runtime;
# the ablation matrix is used for controlled offline benchmarking.
ablation:
  c0:
    pipeline: "exo"
    llama_runtime: "stock"         # vanilla llama.cpp
    ane: "idle"
    triattention: false
    tq_plus: false
    description: "Pure EXO baseline — floor for all comparisons"

  c1:
    pipeline: "exo"
    llama_runtime: "flash_moe_slot_bank"  # anemll-flash-llama.cpp
    ane: "idle"
    triattention: false
    tq_plus: false
    description: "Flash-MoE value add (slot-bank vs stock llama.cpp)"

  c2:
    pipeline: "exo"
    llama_runtime: "stock"
    ane: "draft_0.6b"
    triattention: false
    tq_plus: false
    description: "ANE speculative decode value add"

  c3:
    pipeline: "exo"
    llama_runtime: "flash_moe_slot_bank"
    ane: "idle"
    triattention: true
    tq_plus: false
    description: "TriAttention KV compression value add"

  c4:
    pipeline: "exo"
    llama_runtime: "flash_moe_slot_bank"
    ane: "idle"
    triattention: false
    tq_plus: true
    description: "TQ4_1S weight compression value add"

  c5:
    pipeline: "exo"
    llama_runtime: "flash_moe_slot_bank"
    ane: "draft_0.6b"
    triattention: true
    tq_plus: true
    description: "Full stack — EXO + Flash-MoE + ANE + TriAttention + TQ4_1S (headline)"

  c6:
    pipeline: "exo_72b"
    llama_runtime: "flash_moe_slot_bank"
    ane: "draft_0.6b"
    triattention: true
    tq_plus: true
    description: "72B stretch goal — full stack on Qwen 2.5 72B"

  c7:
    pipeline: "mac_only"
    llama_runtime: "flash_moe_slot_bank"
    ane: "prefill"
    triattention: true
    tq_plus: false
    description: "Mac-only disaggregated — ANE prefill + Metal decode"
