# Model definitions for CROSSFIRE-X experiments.
# All model paths are relative to the models/ directory (gitignored).
#
# The target family is Gemma 4 (Apache 2.0). Three core slots — dense primary,
# ANE draft, and Flash-MoE — plus a long-context stretch reuse the same dense
# weights at 256K ctx to keep the matrix all-Gemma.

models:
  # ── Dense primary ────────────────────────────────────────────────────────
  gemma-4-31b:
    name: "Gemma 4 31B"
    hf_repo: "google/gemma-4-31B-it"
    parameters: 33B
    architecture: dense
    role: primary_dense  # Non-MoE experiments (C0, C2, C4, C5) and long-ctx stretch (C6)
    tokenizer: gemma  # 262K vocab, shared across gemma-4-{E2B,26B-A4B,31B}
    native_context: 262144
    variants:
      q8_0:
        file: "gemma-4-31b-q8_0.gguf"
        size_gb: 33.0
      tq4_1s:
        file: "gemma-4-31b-tq4_1s.gguf"
        size_gb: 23.1
        compress_from: q8_0  # TQ4_1S from Q8_0 only (not Q4_K_M)
    eval_contexts: [8192, 16384, 32768]
    notes: >
      Q8_0 (~33 GB) exceeds RTX 5090 32 GB VRAM -- distributed split required
      for P0 single-node PC. TQ4_1S (~23 GB) fits PC alone. Gemma tokenizer is
      shared with gemma-4-E2B, so speculative decode (P2/P5) uses a coherent
      draft/primary pair.

  # ── ANE draft ────────────────────────────────────────────────────────────
  gemma-4-e2b:
    name: "Gemma 4 E2B"
    hf_repo: "google/gemma-4-E2B-it"
    parameters: "5.1B stored / 2.3B effective"
    architecture: dense
    role: ane_draft
    tokenizer: gemma  # same 262K vocab as primary + MoE
    native_context: 131072
    source: "huggingface"  # HuggingFace weights -> converted to ANE via ANEMLL
    ane_config:
      backend: coreml_chunked  # Gemma4ChunkedEngine (T-0609a) — supersedes anemll
      # Path to the pre-converted CoreML bundle
      # (john-rocky/CoreML-LLM -> mlboydaisuke/gemma-4-E2B-coreml).
      # Contains chunk1/2/3.mlmodelc + external embed/PLE/RoPE tables.
      coreml_bundle_path: models/gemma-4-E2B-coreml
      # Effective context is determined at load from the chunks' causal_mask
      # input shape (observed 512 for the swa-2k variant). max_context here
      # is informational.
      max_context: 512
      # Target tok/s: T-0609a smoke measured ~42 tok/s decode on M4 Max ANE
      # at compute_units=cpu_and_ne. Session 17 monolith floor was 22.5.
      expected_tok_s_target: 40
    notes: >
      E "effective" parameters via PLE: 5.1B stored, 2.3B effective per layer.
      Gemma 3n-lineage edge variant; Google markets it for on-device inference.
      ANE conversion path is a known unknown -- see memory/models_gemma4.md.

  # ── MoE / P6 Flash-MoE ───────────────────────────────────────────────────
  gemma-4-26b-a4b:
    name: "Gemma 4 26B-A4B"
    hf_repo: "google/gemma-4-26B-A4B-it"
    parameters: "25.2B total / 3.8B active"
    architecture: moe
    role: primary_moe  # Flash-MoE experiments (C1, C3, C5, C7)
    tokenizer: gemma
    native_context: 262144
    variants:
      gguf:
        file: "gemma-4-26b-a4b-q8_0.gguf"
        size_gb: 26.0
    flash_moe_config:
      experts_total: 128         # total specialist count in the model
      topk_routed: 8             # activated routed experts per token
      shared_experts: 1          # always-on shared expert per layer
      slot_bank_slots: 128       # one slot per specialist for max hit rate
      mode_stock: true           # all experts fit in 64 GB unified memory
      mode_slot_bank: false      # optional for larger pools / stress tests
    eval_contexts: [8192, 16384, 32768]
    notes: >
      Gemma 4 26B-A4B uses 128 experts with 8 routed + 1 shared per token.
      Sidecar extraction for this topology is unvalidated in
      anemll-flash-llama.cpp (which was built around Qwen / Kimi layouts);
      T-0612 may need extractor patches. All experts fit resident on
      Mac Studio 64 GB in stock mode; slot-bank mode retained for scaling.
      Ships with ~550M vision encoder baked in (harmless for text workloads).

# ── Evaluation dataset ───────────────────────────────────────────────────────
eval_dataset: "wikitext-2-raw-v1"
eval_chunks: 20
eval_chunk_tokens: 512

# ── Ablation matrix (C0-C7) ──────────────────────────────────────────────────
# Tests each component in isolation to measure its independent contribution.
# C0 = floor (pure EXO), C5 = headline (full stack).
# Note: AutoPilot uses execution policies P0-P6 at runtime;
# the ablation matrix is used for controlled offline benchmarking.
ablation:
  c0:
    pipeline: "exo"
    model: "gemma-4-31b"
    llama_runtime: "stock"                # vanilla llama.cpp (TurboQuant+ fork)
    ane: "idle"
    triattention: false
    tq_plus: false
    description: "Pure EXO baseline -- floor for all comparisons"

  c1:
    pipeline: "exo"
    model: "gemma-4-26b-a4b"
    llama_runtime: "flash_moe_slot_bank"  # anemll-flash-llama.cpp
    ane: "idle"
    triattention: false
    tq_plus: false
    description: "Flash-MoE value add (slot-bank vs stock llama.cpp)"

  c2:
    pipeline: "exo"
    model: "gemma-4-31b"
    llama_runtime: "stock"
    ane: "draft_e2b"
    triattention: false
    tq_plus: false
    description: "ANE speculative decode value add (Gemma 4 E2B draft)"

  c3:
    pipeline: "exo"
    model: "gemma-4-26b-a4b"
    llama_runtime: "flash_moe_slot_bank"
    ane: "idle"
    triattention: true
    tq_plus: false
    description: "TriAttention KV compression value add"

  c4:
    pipeline: "exo"
    model: "gemma-4-31b"
    llama_runtime: "stock"
    ane: "idle"
    triattention: false
    tq_plus: true
    description: "TQ4_1S weight compression value add"

  c5:
    pipeline: "exo"
    model: "gemma-4-26b-a4b"
    llama_runtime: "flash_moe_slot_bank"
    ane: "draft_e2b"
    triattention: true
    tq_plus: true
    description: "Full stack -- EXO + Flash-MoE + ANE + TriAttention + TQ4_1S (headline)"

  c6:
    pipeline: "exo"
    model: "gemma-4-31b"
    llama_runtime: "stock"
    ane: "draft_e2b"
    triattention: true
    tq_plus: true
    context_override: 262144
    description: >
      Long-context stretch -- Gemma 4 31B at 256K context, distributed with
      TriAttention KV compression. The impossible-scenario slot (replaces
      the prior Qwen 2.5 72B stretch to keep the matrix all-Gemma).

  c7:
    pipeline: "mac_only"
    model: "gemma-4-26b-a4b"
    llama_runtime: "flash_moe_slot_bank"
    ane: "prefill"
    triattention: true
    tq_plus: false
    description: "Mac-only disaggregated -- ANE prefill + Metal decode + Flash-MoE"
